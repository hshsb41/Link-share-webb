<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CKR UNKNOWN | HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #050505; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
        }
        #bg-canvas { position: fixed; inset: 0; z-index: 1; opacity: 0.3; pointer-events: none; }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
        }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            position: fixed; inset: 0; z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px;
        }

        .logo-img {
            width: 95px; height: 95px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
            margin-bottom: -45px;
            z-index: 1000;
            background: #000;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        .login-card { width: 320px; padding: 65px 30px 35px 30px; text-align: center; }
        
        .pass-input {
            width: 100%; background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05) !important; border-radius: 20px; padding: 16px;
            color: #fff; text-align: center; font-size: 18px;
            letter-spacing: 4px; margin: 20px 0;
            transition: 0.3s;
        }
        .pass-input:focus { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.2) !important; }

        .unlock-btn {
            width: 100%; background: #fff; color: #000;
            font-weight: 800; padding: 16px; border-radius: 20px;
            text-transform: uppercase; font-size: 12px; letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .unlock-btn:active { transform: scale(0.96); opacity: 0.9; }

        .social-login { margin-top: 40px; display: flex; gap: 20px; z-index: 1000; }
        .social-login a { 
            color: #fff; font-size: 22px; opacity: 0.4; 
            width: 55px; height: 55px; display: flex; align-items: center; 
            justify-content: center; background: rgba(255,255,255,0.03); 
            border-radius: 50%; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .social-login a:hover { opacity: 1; background: rgba(255,255,255,0.1); transform: translateY(-8px); border-color: rgba(255,255,255,0.2); }

        /* --- MAIN HUB --- */
        #main-content {
            display: none; position: relative; z-index: 10;
            width: 94%; max-width: 450px; margin: 30px auto;
            opacity: 0; transform: translateY(30px);
            transition: 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        .scroll-area { max-height: 80vh; overflow-y: auto; padding: 5px; scrollbar-width: none; }
        .scroll-area::-webkit-scrollbar { display: none; }

        .link-card {
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 15px; padding: 18px;
            border-radius: 24px; display: flex;
            justify-content: space-between; align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
        }
        .link-card:active { transform: scale(0.96); background: rgba(255, 255, 255, 0.07); }
        
        .icon-box {
            width: 45px; height: 45px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; margin-right: 15px;
            background: rgba(255,255,255,0.03);
        }

        .row-left { display: flex; align-items: center; }
        .row-title { font-size: 15px; font-weight: 700; color: #eee; letter-spacing: 0.3px; }
        .row-subtitle { font-size: 10px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-top: 2px; }
        
        .exit { opacity: 0; visibility: hidden; transform: scale(1.1); filter: blur(20px); }
        .show { opacity: 1 !important; transform: translateY(0) !important; }

        .update-banner {
            margin-top: 25px; padding: 25px; border-radius: 30px;
            background: linear-gradient(145deg, rgba(255,255,255,0.01), rgba(255,255,255,0.04));
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="login-screen">
        <img src="Ckr.png" alt="Logo" class="logo-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'">
        <div class="login-card glass">
            <h2 class="text-2xl font-black tracking-tight">CKR HUB</h2>
            <p class="text-[9px] text-gray-500 uppercase tracking-[5px] mt-1">Authorized Access Only</p>
            <input type="password" id="passInput" class="pass-input" placeholder="••••">
            <button onclick="unlock()" class="unlock-btn">Unlock Hub</button>
            <p id="err" class="text-red-500 text-[10px] mt-4 opacity-0 font-bold uppercase transition-opacity">Invalid Key</p>
        </div>
        
        <div class="social-login">
            <a href="https://wa.me/9779840825493" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="https://youtube.com/@ckrunknown" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://tiktok.com/@ckrunknown" target="_blank"><i class="fab fa-tiktok"></i></a>
        </div>
    </div>

    <div id="main-content">
        <div class="mb-8 px-2 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black tracking-tighter">CKRPRO</h1>
                <p class="text-blue-500 font-bold text-[10px] tracking-[3px] uppercase">Ultimate Dashboard</p>
            </div>
            <div class="flex items-center gap-2 bg-green-500/10 px-3 py-1.5 rounded-full border border-green-500/20">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[9px] font-black text-green-500 uppercase">Live</span>
            </div>
        </div>

        <div class="scroll-area">
            <a href="https://tinyurl.com/ckrpro-ban" target="_blank" class="link-card">
                <div class="row-left">
                    <div class="icon-box text-red-500 bg-red-500/10"><i class="fas fa-shield-virus"></i></div>
                    <div>
                        <div class="row-title">Access Token Ban</div>
                        <div class="row-subtitle">Account security tool</div>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-[10px] opacity-20"></i>
            </a>

            <a href="https://tinyurl.com/ckrpro-freelikeweb" target="_blank" class="link-card">
                <div class="row-left">
                    <div class="icon-box text-pink-500 bg-pink-500/10"><i class="fas fa-heart"></i></div>
                    <div>
                        <div class="row-title">FF 20 Likes Free</div>
                        <div class="row-subtitle">Instant social boost</div>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-[10px] opacity-20"></i>
            </a>

            <a href="https://tinyurl.com/ckrpro-bancheck" target="_blank" class="link-card">
                <div class="row-left">
                    <div class="icon-box text-yellow-500 bg-yellow-500/10"><i class="fas fa-user-check"></i></div>
                    <div>
                        <div class="row-title">FF Ban Check</div>
                        <div class="row-subtitle">Verify status instantly</div>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-[10px] opacity-20"></i>
            </a>

            <a href="https://tinyurl.com/Ckrpro-emoteWeb" target="_blank" class="link-card">
                <div class="row-left">
                    <div class="icon-box text-cyan-400 bg-cyan-400/10"><i class="fas fa-bolt"></i></div>
                    <div>
                        <div class="row-title">5 Group & Emote</div>
                        <div class="row-subtitle">Action automation</div>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-[10px] opacity-20"></i>
            </a>

            <div class="update-banner">
                <p class="text-[10px] text-gray-500 font-bold tracking-[3px] uppercase mb-1">Coming Soon</p>
                <h3 class="text-sm font-black text-white/80">NEW UPDATES & PREMIUM SUPPORT</h3>
                <div class="w-10 h-1 bg-blue-600 mx-auto mt-4 rounded-full opacity-50"></div>
            </div>
        </div>
    </div>

    <script>
        // Particle Background
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let parts = [];
        function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = res; res();
        class P {
            constructor() { this.init(); }
            init() {
                this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height;
                this.s = Math.random()*1.5; this.vy = -Math.random()*0.4;
                this.o = Math.random()*0.3;
            }
            up() { this.y += this.vy; if(this.y < -5) this.y = canvas.height+5; }
            dr() { ctx.fillStyle=`rgba(255,255,255,${this.o})`; ctx.beginPath(); ctx.arc(this.x,this.y,this.s,0,Math.PI*2); ctx.fill(); }
        }
        for(let i=0; i<40; i++) parts.push(new P());
        function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); parts.forEach(p=>{p.up(); p.dr();}); requestAnimationFrame(anim); }
        anim();

        // Unlock Logic
        function unlock() {
            const pin = document.getElementById('passInput').value;
            if(pin === "ckrmod") {
                document.getElementById('login-screen').classList.add('exit');
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    const hub = document.getElementById('main-content');
                    hub.style.display = 'block';
                    setTimeout(() => hub.classList.add('show'), 100);
                }, 800);
            } else {
                const e = document.getElementById('err'); e.style.opacity='1';
                setTimeout(() => e.style.opacity='0', 2000);
            }
        }
        document.getElementById('passInput').addEventListener('keypress', (e) => { if(e.key==='Enter') unlock(); });
    </script>
</body>
</html>
